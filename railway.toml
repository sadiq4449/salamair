# Railway config-as-code: https://docs.railway.com/deploy/config-as-code
#
# Monolith: Dockerfile builds the Vite SPA into Backend/static, then runs FastAPI + uvicorn on PORT.
# Root directory for the service: repo root (do not set to Backend/ or frontend/ alone).
#
# === Deploy steps ===
# 1. New Project → "Deploy from GitHub repo" (this repo) or `railway up` from the CLI.
# 2. Add PostgreSQL: "+ New" → Database → PostgreSQL. Link DATABASE_URL to the web service.
# 3. Web service → Variables (minimum for production):
#    - SECRET_KEY         Long random string (required).
#    - CORS_ORIGINS       Comma list; must include your public app origin, e.g. https://your-app.up.railway.app
#    - CORS_ORIGIN_REGEX  Optional; e.g. https://.*\.up\.railway\.app$ for default Railway hosts.
#    - DATABASE_SSLMODE   Optional; "require" if you see Postgres SSL errors (many Railway URLs auto-SSL).
#    - Email: Free/Hobby often blocks SMTP 465/587 — use RESEND_API_KEY (HTTPS/443). IMAP 993 inbound usually works.
#      Full list: Backend/.env.example. After deploy: Admin → Dashboard → "Email (deploy check)".
#    - REDIS_URL          Optional. If set, analytics may use Redis; else in-process TTL cache (see ANALYTICS_CACHE_TTL_SECONDS in config).
#    - GROQ_API_KEY       Optional. Powers POST /api/v1/ai/pricing-assistant; omit for heuristic-only AI card (see Backend/.env.example).
#    - GROQ_MODEL         Optional; default llama-3.3-70b-versatile. Or sync from local .env: python Backend/scripts/sync_env_to_railway.py
# 4. Settings → Networking → Generate domain (open / for SPA; API under /api/v1/...).
#
# Health: GET /api/health — used below; no DB round-trip (DB still required at startup for schema).
# Admin dashboard stats (users, requests, emails, API process uptime) come from the database and process start time.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
